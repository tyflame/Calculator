# Compila APK debug senza Android Studio: GitHub → Actions → Run workflow → Scarica artifact
name: Build Android APK (debug)

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools platforms;android-34 build-tools;34.0.0

      - name: Dipendenze npm
        run: npm install

      - name: Progetto Capacitor Android
        env:
          CI: "true"
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync

      - name: Permesso esecuzione Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Individua APK (Capacitor o altri layout)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          APK=$(find . -name "app-debug.apk" -path "*/apk/debug/*" 2>/dev/null | head -n 1 || true)
          if [ -z "${APK}" ]; then
            echo "::error::APK non trovato dopo assembleDebug. File .apk presenti:"
            find . -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "Trovato: ${APK}"
          cp "${APK}" "${GITHUB_WORKSPACE}/FLAME-CALC-debug.apk"
          ls -la "${GITHUB_WORKSPACE}/FLAME-CALC-debug.apk"

      - name: Carica APK
        uses: actions/upload-artifact@v7
        with:
          name: FLAME-CALC-android
          path: FLAME-CALC-debug.apk
          if-no-files-found: error
