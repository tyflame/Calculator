<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"/>
  <meta name="theme-color" content="#0e0820"/>
  <title>FLAME CALC</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root[data-theme="dark"] {
      --bg-page:       #0e0820;
      --calc-bg1:      #2a1a4e;
      --calc-bg2:      #1a0f35;
      --calc-bg3:      #150c2e;
      --calc-shadow:   rgba(180,120,255,.25);
      --display-bg1:   #0d0820;
      --display-bg2:   #100d25;
      --display-border:rgba(120,60,220,.3);
      --chip-color:    rgba(180,130,255,.5);
      --expr-color:    rgba(180,130,255,.55);
      --main-color:    #e8d4ff;
      --main-shadow:   rgba(180,100,255,.4);
      --model-color:   rgba(200,170,255,.6);
      --brand-sub:     rgba(200,170,255,.55);
      --brand-name:    #fff;
      --footer-color:  rgba(180,130,255,.25);
      --btn-num-bg1:   #2e1d5a;
      --btn-num-bg2:   #1e1240;
      --btn-num-color: #c8aaee;
      --btn-num-border:rgba(120,70,200,.25);
      --btn-num-shadow:#120a28;
      --btn-op-bg1:    #6a35c8;
      --btn-op-bg2:    #4a1fa0;
      --btn-op-color:  #d4aaff;
      --btn-op-shadow: #2d1060;
      --btn-back-bg1:  #3d2070;
      --btn-back-bg2:  #2a1450;
      --btn-back-color:#d4aaff;
      --btn-back-shadow:#180c38;
      --btn-back-border:rgba(140,80,230,.2);
      --toggle-border: rgba(160,80,255,.35);
      --toggle-bg:     rgba(30,15,60,.6);
      --toggle-icon:   rgba(220,190,255,.8);
    }

    :root[data-theme="light"] {
      --bg-page:       #f0ebff;
      --calc-bg1:      #ffffff;
      --calc-bg2:      #f5f0ff;
      --calc-bg3:      #ede6ff;
      --calc-shadow:   rgba(120,60,200,.2);
      --display-bg1:   #1a0a3a;
      --display-bg2:   #220d48;
      --display-border:rgba(140,80,230,.4);
      --chip-color:    rgba(200,160,255,.7);
      --expr-color:    rgba(200,160,255,.7);
      --main-color:    #f0e0ff;
      --main-shadow:   rgba(200,120,255,.5);
      --model-color:   #7040b0;
      --brand-sub:     #9060d0;
      --brand-name:    #2a0a60;
      --footer-color:  rgba(120,70,180,.35);
      --btn-num-bg1:   #ede6ff;
      --btn-num-bg2:   #e0d6ff;
      --btn-num-color: #3a1880;
      --btn-num-border:rgba(140,90,220,.3);
      --btn-num-shadow:#c4b4f0;
      --btn-op-bg1:    #8855dd;
      --btn-op-bg2:    #6635bb;
      --btn-op-color:  #fff;
      --btn-op-shadow: #4420a0;
      --btn-back-bg1:  #d8ccff;
      --btn-back-bg2:  #c8b8f8;
      --btn-back-color:#2a0a60;
      --btn-back-shadow:#a898e0;
      --btn-back-border:rgba(140,80,230,.25);
      --toggle-border: rgba(120,60,200,.3);
      --toggle-bg:     rgba(240,235,255,.9);
      --toggle-icon:   #6030b0;
    }

    html,body{
      width:100%;min-height:100%;
      min-height:-webkit-fill-available;
      background:var(--bg-page);
      display:flex;justify-content:center;align-items:center;
      user-select:none;overflow:hidden;
      transition:background .35s;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    body{
      padding:max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .calculator{
      width:min(340px, 100%);
      background:linear-gradient(160deg,var(--calc-bg1) 0%,var(--calc-bg2) 50%,var(--calc-bg3) 100%);
      border-radius:24px;padding:20px 20px 28px;
      box-shadow:0 0 0 1px var(--calc-shadow),0 30px 80px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);
      position:relative;overflow:hidden;
      transition:background .35s,box-shadow .35s;
    }
    .calculator::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(160,90,255,.12) 0%,transparent 70%);pointer-events:none}
    .calculator::after{content:'';position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(100,60,200,.08) 0%,transparent 70%);pointer-events:none}

    .calc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}

    .header-left{display:flex;flex-direction:column;gap:2px;}
    .calc-model{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:11px;font-weight:300;color:var(--model-color);letter-spacing:2px;text-transform:uppercase;transition:color .35s;}

    .header-right{display:flex;align-items:center;gap:8px;}

    .theme-toggle{
      width:30px;height:30px;border-radius:8px;
      background:var(--toggle-bg);
      border:1px solid var(--toggle-border);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .35s,border .35s,transform .1s;
      outline:none;padding:0;
    }
    .theme-toggle:active{transform:scale(.9);}
    .theme-toggle svg{width:15px;height:15px;transition:opacity .2s;}

    .brand-logo{display:flex;align-items:center;gap:7px;}
    .brand-text{display:flex;flex-direction:column;gap:0px;}
    .brand-sub{font-family:'Arial Black',sans-serif;font-size:9px;font-weight:900;color:var(--brand-sub);letter-spacing:2.5px;transition:color .35s;}
    .brand-name{font-family:'Arial Black',sans-serif;font-size:15px;font-weight:900;color:var(--brand-name);letter-spacing:1px;transition:color .35s;}

    .accent-line{height:2px;background:linear-gradient(90deg,transparent,rgba(160,80,255,.5),rgba(200,120,255,.6),rgba(160,80,255,.5),transparent);border-radius:2px;margin-bottom:16px;}

    .display-shell{
      background:linear-gradient(180deg,var(--display-bg1) 0%,var(--display-bg2) 100%);
      border-radius:12px;padding:14px 16px 12px;margin-bottom:20px;
      border:1px solid var(--display-border);
      box-shadow:inset 0 2px 12px rgba(0,0,0,.5);
      position:relative;overflow:hidden;
      transition:background .35s,border .35s;
    }
    .display-shell::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(180,100,255,.4),transparent);}
    .display-meta{display:flex;justify-content:flex-end;gap:8px;margin-bottom:4px;}
    .display-chip{font-family:'DM Sans',-apple-system,sans-serif;font-size:10px;color:var(--chip-color);letter-spacing:1px;transition:color .35s;}
    .display-expr{font-family:'Orbitron',ui-monospace,monospace;font-size:12px;font-weight:400;color:var(--expr-color);text-align:right;min-height:18px;letter-spacing:1px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .35s;}
    .display-main{font-family:'Orbitron',ui-monospace,monospace;font-size:36px;font-weight:700;color:var(--main-color);text-align:right;letter-spacing:2px;line-height:1;text-shadow:0 0 20px var(--main-shadow);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .35s,text-shadow .35s;}
    .display-main.flash{color:#fff;}

    .buttons-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
    .btn{height:56px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',-apple-system,sans-serif;font-size:16px;font-weight:500;transition:transform .08s,box-shadow .08s,background .35s,color .35s;outline:none;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:translateY(3px) scale(.97);}

    .btn-clear{background:linear-gradient(180deg,#b040f0 0%,#8020cc 100%);color:#fff;box-shadow:0 4px 0 #5a129a,0 6px 12px rgba(130,40,200,.4);grid-column:span 2;font-size:14px;letter-spacing:1px;}
    .btn-clear:active{box-shadow:0 1px 0 #5a129a;}
    .btn-op{background:linear-gradient(180deg,var(--btn-op-bg1) 0%,var(--btn-op-bg2) 100%);color:var(--btn-op-color);box-shadow:0 4px 0 var(--btn-op-shadow),0 6px 12px rgba(80,30,160,.35);font-size:18px;}
    .btn-op:active{box-shadow:0 1px 0 var(--btn-op-shadow);}
    .btn-num{background:linear-gradient(180deg,var(--btn-num-bg1) 0%,var(--btn-num-bg2) 100%);color:var(--btn-num-color);box-shadow:0 4px 0 var(--btn-num-shadow),0 6px 12px rgba(30,15,60,.25);border:1px solid var(--btn-num-border);font-size:18px;}
    .btn-num:active{box-shadow:0 1px 0 var(--btn-num-shadow);}
    .btn-zero{grid-column:span 2;}
    .btn-equals{background:linear-gradient(180deg,#c050ff 0%,#9030e0 100%);color:#fff;box-shadow:0 4px 0 #6010a0,0 6px 16px rgba(160,60,255,.45);font-size:22px;}
    .btn-equals:active{box-shadow:0 1px 0 #6010a0;}
    .btn-back{background:linear-gradient(180deg,var(--btn-back-bg1) 0%,var(--btn-back-bg2) 100%);color:var(--btn-back-color);box-shadow:0 4px 0 var(--btn-back-shadow),0 6px 12px rgba(50,25,100,.25);border:1px solid var(--btn-back-border);font-size:14px;}
    .btn-back:active{box-shadow:0 1px 0 var(--btn-back-shadow);}

    .calc-footer{margin-top:16px;text-align:center;}
    .calc-footer-text{font-family:'DM Sans',-apple-system,sans-serif;font-size:9px;color:var(--footer-color);letter-spacing:2px;text-transform:uppercase;transition:color .35s;}
  </style>
</head>
<body>
  <div class="calculator">
    <div class="calc-header">
      <div class="header-left">
        <span class="calc-model">by TY FLAME</span>
      </div>
      <div class="header-right">
        <button type="button" class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Cambia tema">
          <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="var(--toggle-icon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="var(--toggle-icon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div class="brand-logo">
          <svg width="22" height="30" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2C14 2 20 8 20 14C20 16 19.2 17.8 18 19C18 19 20 17 20 14C20 14 22 20 18 24C18 24 20 21 19 19C19 19 20 22 17 25C15.5 26.5 14 28 14 31C14 28 12.5 26.5 11 25C8 22 9 19 9 19C8 21 10 24 10 24C6 20 8 14 8 14C8 17 10 19 10 19C8.8 17.8 8 16 8 14C8 8 14 2 14 2Z" fill="url(#fg1)"/>
            <path d="M14 12C14 12 17 15 17 18C17 19.5 16.3 20.8 15 22C15 22 16.5 20 16.5 18C16.5 18 17.5 21 15.5 23C15.5 23 16 21.5 15.5 20.5C15.5 20.5 16 22 14 24C12 22 12.5 20.5 12.5 20.5C12 21.5 12.5 23 12.5 23C10.5 21 11.5 18 11.5 18C11.5 20 13 22 13 22C11.7 20.8 11 19.5 11 18C11 15 14 12 14 12Z" fill="url(#fg2)"/>
            <defs>
              <linearGradient id="fg1" x1="14" y1="2" x2="14" y2="31" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#e8d4ff"/><stop offset="40%" stop-color="#b060f0"/><stop offset="100%" stop-color="#6020b0"/>
              </linearGradient>
              <linearGradient id="fg2" x1="14" y1="12" x2="14" y2="24" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="60%" stop-color="#e8aaff"/><stop offset="100%" stop-color="#c070ff"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="brand-text">
            <span class="brand-sub">TY FLAME</span>
            <span class="brand-name">FLAME CALC</span>
          </div>
        </div>
      </div>
    </div>

    <div class="accent-line"></div>

    <div class="display-shell">
      <div class="display-meta">
        <span class="display-chip">DEG</span>
        <span class="display-chip">NORM</span>
      </div>
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="display">0</div>
    </div>

    <div class="buttons-grid">
      <button type="button" class="btn btn-clear" onclick="clearAll()">AC</button>
      <button type="button" class="btn btn-back" onclick="backspace()">DEL</button>
      <button type="button" class="btn btn-op" onclick="inputOp('/')">div</button>
      <button type="button" class="btn btn-num" onclick="inputNum('7')">7</button>
      <button type="button" class="btn btn-num" onclick="inputNum('8')">8</button>
      <button type="button" class="btn btn-num" onclick="inputNum('9')">9</button>
      <button type="button" class="btn btn-op" onclick="inputOp('*')">x</button>
      <button type="button" class="btn btn-num" onclick="inputNum('4')">4</button>
      <button type="button" class="btn btn-num" onclick="inputNum('5')">5</button>
      <button type="button" class="btn btn-num" onclick="inputNum('6')">6</button>
      <button type="button" class="btn btn-op" onclick="inputOp('-')">-</button>
      <button type="button" class="btn btn-num" onclick="inputNum('1')">1</button>
      <button type="button" class="btn btn-num" onclick="inputNum('2')">2</button>
      <button type="button" class="btn btn-num" onclick="inputNum('3')">3</button>
      <button type="button" class="btn btn-op" onclick="inputOp('+')">+</button>
      <button type="button" class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
      <button type="button" class="btn btn-num" onclick="inputDot()">.</button>
      <button type="button" class="btn btn-equals" onclick="calculate()">=</button>
    </div>

    <div class="calc-footer">
      <span class="calc-footer-text">TY FLAME PRODUCTIONS</span>
    </div>
  </div>

  <script>
    var current='0',expression='',shouldReset=false,lastOp=false;
    var display=document.getElementById('display'),exprEl=document.getElementById('expr');
    var theme = localStorage.getItem('fc-theme') || 'dark';
    applyTheme(theme);

    function applyTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('iconMoon').style.display = t==='dark' ? 'block' : 'none';
      document.getElementById('iconSun').style.display  = t==='light' ? 'block' : 'none';
      localStorage.setItem('fc-theme', t);
    }
    function toggleTheme(){
      theme = theme==='dark' ? 'light' : 'dark';
      applyTheme(theme);
    }
    function updateDisplay(v){
      var s=String(v);
      if(s.length>12) s=parseFloat(v).toExponential(6);
      display.textContent=s;
      display.classList.add('flash');
      setTimeout(function(){display.classList.remove('flash');},80);
    }
    function inputNum(n){
      if(shouldReset){current=n;shouldReset=false;}
      else if(current==='0') current=n;
      else if(current.length<12) current+=n;
      lastOp=false; updateDisplay(current);
    }
    function inputDot(){
      if(shouldReset){current='0.';shouldReset=false;}
      else if(!current.includes('.')) current+='.';
      lastOp=false; updateDisplay(current);
    }
    function inputOp(op){
      if(!lastOp&&expression!==''){
        try{var r=Function('return '+expression+current)();current=String(r);updateDisplay(current);}catch(e){}
      }
      var sym=op==='*'?'x':op==='/'?'div':op;
      expression=current+op;
      exprEl.textContent=current+' '+sym;
      shouldReset=true;lastOp=true;
    }
    function calculate(){
      if(!expression) return;
      try{
        var r=Function('return '+expression+current)();
        exprEl.textContent=exprEl.textContent+' '+current+' =';
        if(!isFinite(r)){updateDisplay('Error');current='0';expression='';return;}
        var rr=parseFloat(r.toFixed(10));
        current=String(rr);updateDisplay(current);
        expression='';shouldReset=true;lastOp=false;
      }catch(e){updateDisplay('Error');current='0';expression='';exprEl.textContent='';}
    }
    function clearAll(){current='0';expression='';shouldReset=false;lastOp=false;updateDisplay('0');exprEl.textContent='';}
    function backspace(){
      if(shouldReset) return;
      if(current.length>1) current=current.slice(0,-1);
      else current='0';
      updateDisplay(current);
    }
    document.addEventListener('keydown',function(e){
      if(e.key>='0'&&e.key<='9') inputNum(e.key);
      else if(e.key==='.') inputDot();
      else if(e.key==='+') inputOp('+');
      else if(e.key==='-') inputOp('-');
      else if(e.key==='*') inputOp('*');
      else if(e.key==='/'){e.preventDefault();inputOp('/');}
      else if(e.key==='Enter'||e.key==='=') calculate();
      else if(e.key==='Backspace') backspace();
      else if(e.key==='Escape') clearAll();
    });
  </script>
</body>
</html>
